<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay Google Login Token Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
        color: #172033;
        background: #f7f3ea;
      }
      .card {
        background: #fffaf0;
        border: 1px solid #e1d4bd;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(63, 46, 22, 0.12);
      }
      label {
        display: block;
        font-weight: 700;
        margin: 18px 0 8px;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c9b99f;
        border-radius: 12px;
        padding: 12px;
        font: inherit;
        background: #fff;
      }
      textarea {
        min-height: 180px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 18px;
        font-weight: 800;
        cursor: pointer;
        background: #214e34;
        color: white;
        margin-top: 14px;
      }
      .muted {
        color: #6a6257;
        line-height: 1.55;
      }
      code {
        background: #efe4d0;
        padding: 2px 6px;
        border-radius: 6px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      #googleButton {
        margin-top: 16px;
      }
      .status {
        margin-top: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Relay Google Login Token Test</h1>
      <p class="muted">
        Use this page only to generate a real Google ID token. Copy the token into Swagger endpoint
        <code>POST /api/mobile/auth/google</code> as <code>{ "idToken": "..." }</code>.
      </p>

      <label for="clientId">Google Client ID</label>
      <input id="clientId" placeholder="xxxxx.apps.googleusercontent.com" />

      <div class="row">
        <button type="button" id="initButton">Initialize Google Button</button>
        <div id="googleButton"></div>
      </div>

      <p id="status" class="status muted">Waiting for Google Client ID.</p>

      <label for="idToken">Generated Google ID Token</label>
      <textarea id="idToken" readonly placeholder="After Google sign-in, the ID token appears here."></textarea>

      <button type="button" id="copyButton">Copy ID Token</button>

      <h2>Swagger body</h2>
      <textarea id="swaggerBody" readonly>{
  "idToken": ""
}</textarea>
    </main>

    <script>
      const clientIdInput = document.getElementById('clientId');
      const initButton = document.getElementById('initButton');
      const idTokenOutput = document.getElementById('idToken');
      const swaggerBodyOutput = document.getElementById('swaggerBody');
      const statusOutput = document.getElementById('status');
      const copyButton = document.getElementById('copyButton');

      function setToken(token) {
        idTokenOutput.value = token;
        swaggerBodyOutput.value = JSON.stringify({ idToken: token }, null, 2);
        statusOutput.textContent = 'Token generated. Copy it into Swagger.';
      }

      initButton.addEventListener('click', () => {
        const clientId = clientIdInput.value.trim();
        if (!clientId) {
          statusOutput.textContent = 'Paste GOOGLE_CLIENT_ID first.';
          return;
        }

        if (!window.google?.accounts?.id) {
          statusOutput.textContent = 'Google script is not loaded yet. Wait a second and try again.';
          return;
        }

        window.google.accounts.id.initialize({
          client_id: clientId,
          callback: (response) => {
            if (!response.credential) {
              statusOutput.textContent = 'Google did not return an ID token.';
              return;
            }
            setToken(response.credential);
          },
        });

        window.google.accounts.id.renderButton(document.getElementById('googleButton'), {
          theme: 'outline',
          size: 'large',
          text: 'signin_with',
          shape: 'pill',
        });

        statusOutput.textContent = 'Click the Google sign-in button.';
      });

      copyButton.addEventListener('click', async () => {
        if (!idTokenOutput.value) {
          statusOutput.textContent = 'No token to copy yet.';
          return;
        }
        await navigator.clipboard.writeText(idTokenOutput.value);
        statusOutput.textContent = 'ID token copied.';
      });
    </script>
  </body>
</html>
